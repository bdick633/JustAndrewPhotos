<!DOCTYPE html>
<html lang="pl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAndrew - Galeria Fotografii</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥵%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        html.dark body { background-color: #0D0E12; color: #E2E8F0; }
        html.dark #siteTitle, html.dark #mainHeading { color: #FFFFFF; }
        html.dark #mainSubtext { color: #94A3B8; }
        html.dark .bg-card, html.dark .bg-modal-content { background-color: #1a1c24; border-color: #1f2937; }
        .gallery-img { transition: transform 0.4s ease-out, filter 0.4s ease; }
        .gallery-img:hover { transform: scale(1.03); filter: brightness(1.05); }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .tag-badge { cursor: pointer; transition: all 0.2s; }
        .tag-badge:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .favorite-btn { background-color: rgba(107, 114, 128, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-[#F3F4F6] text-gray-800 font-sans min-h-screen flex flex-col justify-between" id="siteBody">

    <div id="adBanner" class="bg-gradient-to-r from-emerald-600 to-teal-600 py-3 px-6 shadow-sm border-b border-emerald-400/20">
        <div class="max-w-6xl mx-auto flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <span class="bg-emerald-200 text-emerald-900 text-[10px] font-extrabold px-2 py-0.5 rounded uppercase">Reklama</span>
                <p class="text-white font-medium text-sm">Sprawdź serwer: <span class="font-mono bg-emerald-800/30 px-2 py-0.5 rounded text-emerald-200">JustAndrewSMP.aternos.me</span></p>
            </div>
            <div id="adActionButtons" class="flex items-center gap-4">
                <button onclick="copyDirect('JustAndrewSMP.aternos.me')" class="text-xs bg-white text-emerald-900 font-bold py-1.5 px-3 rounded-lg hover:bg-gray-50 transition">Kopiuj IP</button>
                <button onclick="showConfirmationOptions()" class="text-emerald-200 hover:text-white text-sm"><i class="fas fa-times"></i></button>
            </div>
            <div id="adConfirmationOptions" class="hidden flex items-center gap-4">
                <button onclick="dismissAdPermanently()" class="text-xs bg-red-600 text-white font-bold py-1.5 px-3 rounded-lg">Nie wyświetlaj ponownie</button>
                <button onclick="cancelConfirmationOptions()" class="text-xs bg-white/10 text-white py-1.5 px-3 rounded-lg">Anuluj</button>
            </div>
        </div>
    </div>

    <header class="py-8 px-6 md:px-12 flex justify-between items-center max-w-6xl mx-auto w-full relative z-40">
        <span id="siteTitle" class="font-extrabold text-2xl tracking-tight text-gray-900">JustAndrew</span>
        <div class="flex items-center space-x-5">
            <button onclick="toggleFavoritesView()" id="favoritesTabBtn" class="flex items-center gap-2 px-3.5 py-2 rounded-xl text-sm font-bold bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-300 transition-all">
                <i class="far fa-heart"></i> <span id="favoritesTabText">Ulubione</span>
            </button>
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800"><i id="themeIcon" class="fas fa-moon text-lg"></i></button>
            <div class="flex items-center space-x-4 text-gray-600 dark:text-gray-400">
                <a href="https://www.instagram.com/andrewgod666/" target="_blank"><i class="fab fa-instagram text-xl"></i></a>
                <a href="https://www.facebook.com/people/%C5%81ukasz-Andrzejewski/pfbid0McQqiu1gHFkZE8tBkYXC8iRYKnGYcY9Jhr5UgGerzrWY8VAdDW8ajZZhye9nKo6Tl/" target="_blank"><i class="fab fa-facebook-f text-xl"></i></a>
                <a href="https://www.youtube.com/@andrewgod666" target="_blank"><i class="fab fa-youtube text-xl"></i></a>
                <a href="https://www.tiktok.com/@endrjugod666?_r=1&_t=ZN-967GapBXcLW" target="_blank"><i class="fab fa-tiktok text-xl"></i></a>
                <a href="https://steamcommunity.com/id/asdasdasdas1231" target="_blank"><i class="fab fa-steam text-xl"></i></a>
                <a href="https://tipply.pl/@justandrew" target="_blank" class="w-6 h-6 flex items-center justify-center font-bold border-2 border-current rounded-full text-[10px]">Tip</a>
                <button onclick="openDiscordModal()"><i class="fab fa-discord text-xl"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow px-6 md:px-12 max-w-6xl mx-auto w-full py-10">
        <section class="text-center mb-10 max-w-2xl mx-auto">
            <h1 id="mainHeading" class="text-4xl md:text-6xl font-black text-gray-900 mb-4">Witaj w moim świecie</h1>
            <p id="mainSubtext" class="text-gray-600 text-lg mb-6">Przeglądaj moje zdjęcia i używaj tagów.</p>
            <div class="flex flex-col md:flex-row gap-4 items-center justify-center mb-6">
                <select id="categorySelect" onchange="filterCategory(this.value)" class="w-full md:w-64 px-5 py-3 bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 rounded-2xl text-sm font-bold dark:text-white focus:outline-none shadow-sm cursor-pointer">
                    <option value="all">Wszystkie kategorie</option>
                    <option value="Stream">Stream</option>
                    <option value="Praca">Praca</option>
                    <option value="Relaks">Relaks</option>
                </select>
                <div class="relative w-full max-w-xs">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="filterSearch()" placeholder="Szukaj..." class="w-full pl-11 pr-4 py-3 bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 rounded-2xl text-sm focus:outline-none dark:text-white">
                </div>
            </div>
        </section>

        <section id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 pb-12"></section>

        <section class="flex flex-col items-center justify-center text-center mt-6 mb-12 p-8 bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 rounded-3xl shadow-sm max-w-2xl mx-auto">
            <h3 class="text-xl font-black dark:text-white mb-2">Chcesz dodać zdjęcie?</h3>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScAf4V7Up8Mn7pZ3yLpe6mD7kkKDMeeF0CIOnlLNGwTgikUFw/viewform" target="_blank" class="py-3.5 px-8 bg-indigo-600 text-white font-bold rounded-xl transition shadow-lg">Prześlij zdjęcie</a>
        </section>
    </main>

    <div id="imageModal" onclick="checkCloseModal(event)" class="fixed inset-0 bg-black/85 backdrop-blur-md flex items-center justify-center z-50 p-6 hidden">
        <div onclick="event.stopPropagation()" class="max-w-4xl w-full flex flex-col items-center modal-fade-in bg-[#F3F4F6] dark:bg-[#1a1c24] p-6 rounded-3xl border border-gray-300 dark:border-gray-700 shadow-2xl">
            <div class="w-full flex justify-between items-center mb-4">
                <button id="modalFavBtn" onclick="toggleFavoriteFromModal()" class="p-2.5 rounded-full text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-700"><i class="far fa-heart"></i></button>
                <h3 id="modalTitle" class="text-xl font-bold text-gray-900 dark:text-white"></h3>
                <button onclick="closeImageModal()" class="text-gray-500 text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex items-center justify-between w-full max-h-[50vh] mb-6 gap-4">
                <button onclick="prevImage()" class="p-3 bg-gray-300/50 dark:bg-gray-700/50 rounded-full hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-chevron-left text-lg"></i></button>
                <img id="modalImage" src="" class="object-contain max-h-[50vh] rounded-2xl shadow-lg border border-gray-300 dark:border-gray-700">
                <button onclick="nextImage()" class="p-3 bg-gray-300/50 dark:bg-gray-700/50 rounded-full hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-chevron-right text-lg"></i></button>
            </div>
            <div id="descriptionBox" class="hidden w-full max-w-2xl bg-white dark:bg-[#0D0E12] p-4 rounded-2xl border border-gray-300 dark:border-gray-700 mb-6 text-sm dark:text-gray-300">
                <p id="modalDescriptionText" class="mb-4"></p>
                <div id="modalTags" class="flex flex-wrap gap-2 pt-3 border-t border-gray-100 dark:border-gray-800"></div>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 w-full justify-center">
                <button onclick="toggleDescription()" id="descButton" class="flex-1 py-2 px-3 bg-amber-600 text-white font-semibold rounded-xl text-sm"><i class="fas fa-info-circle mr-2"></i> Pokaż opis</button>
                <a id="modalDownloadBtn" href="" download class="flex-1 py-2 px-3 bg-green-600 text-white font-semibold rounded-xl text-center text-sm"><i class="fas fa-download mr-2"></i> Pobierz</a>
                <button onclick="closeImageModal()" class="flex-1 py-2 px-3 bg-gray-600 text-white font-semibold rounded-xl text-sm">Zamknij</button>
            </div>
        </div>
    </div>

    <div id="discordModal" class="fixed inset-0 bg-black/60 items-center justify-center z-50 p-6 hidden">
        <div class="bg-white dark:bg-[#1a1c24] p-8 rounded-3xl text-center max-w-sm w-full">
            <h3 class="text-xl font-bold dark:text-white mb-4">Mój Discord: andrewk0x</h3>
            <button onclick="document.getElementById('discordModal').classList.add('hidden')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Zamknij</button>
        </div>
    </div>

    <script>
        // TWOJA BAZA ZDJĘĆ Z NOWYMI TAGAMI I NAZWAMI
        const photosDatabase = [
            { src: 'image1.png', title: 'Moment zdziwienia', cat: 'Stream', tags: ['twarz', 'zdziwienie', 'memy'], desc: 'To ujęcie zostało zrobione w zupełnie niespodziewanym momencie.' },
            { src: 'image2.png', title: 'Duet', cat: 'Stream', tags: ['rodzenstwo', 'przyjaciele', 'znajomi'], desc: 'Na zdjęciu widać relację między dwiema postaciami.' },
            { src: 'image3.png', title: 'Flexing', cat: 'Stream', tags: ['mięśnie', 'biceps', 'siła'], desc: 'Zdjęcie zrobione podczas treningu.' },
            { src: 'image4.png', title: 'Świeca', cat: 'Stream', tags: ['świeca', 'akrobata', 'idiota'], desc: 'Chwila pełna energii i dynamiki.' },
            { src: 'image5.png', title: 'Refreshment', cat: 'Stream', tags: ['piwo', 'lech', 'alkoholik'], desc: 'Chwila orzeźwienia i relaksu w trakcie dnia.' },
            { src: 'image6.png', title: 'Głębokie skupienie', cat: 'Stream', tags: ['zakola', 'twarz'], desc: 'Moment, w którym liczy się tylko precyzja i spokój.' },
            { src: 'image7.png', title: 'Odświeżenie', cat: 'Stream', tags: ['picie', 'relaks', 'przerwa'], desc: 'Kolejny moment na relaks i złapanie oddechu.' },
            { src: 'image8.png', title: 'Przerwa na sprzęt', cat: 'Stream', tags: ['setup', 'technologia'], desc: 'Zdjęcie zrobione w trakcie przygotowań technicznych.' },
            { src: 'image9.png', title: 'Serce', cat: 'Stream', tags: ['uwu', 'gej'], desc: 'Wyrażenie wdzięczności dla widzów.' },
            { src: 'image10.png', title: 'Przyjaciele', cat: 'Stream', tags: ['ekipa', 'ludzie'], desc: 'Wspólnie spędzony czas.' },
            { src: 'image11.png', title: 'Z puszystym przyjacielem', cat: 'Stream', tags: ['kot', 'przyjaciel', 'dziecko', 'cute'], desc: 'Słodka chwila z pupilem.' },
            { src: 'image12.png', title: 'Zbliżenie', cat: 'Stream', tags: ['uśmiech', 'twarz'], desc: 'Radosny moment pełen pozytywnej energii.' },
            { src: 'image13.png', title: 'Pozdrowienia', cat: 'Stream', tags: ['siema', 'live'], desc: 'Kadr podczas interakcji z widzami online.' },
            { src: 'image14.jpg', title: 'Skupienie', cat: 'Stream', tags: ['praca', 'gaming'], desc: 'Pełne zaangażowanie w wykonywane zadanie.' },
            { src: 'image15.png', title: 'Trening', cat: 'Stream', tags: ['siłownia', 'sport'], desc: 'Kolejne ujęcie pokazujące pasję.' },
            { src: 'image16.png', title: 'Serce w pracy', cat: 'Praca', tags: ['ciężarówka', 'cute'], desc: 'Pozytywny gest i uśmiech dla wszystkich.' },
            { src: 'image17.png', title: 'Niezadowolenie', cat: 'Praca', tags: ['fuck', 'złość', 'obraza'], desc: 'Wyrażenie emocji w zabawny sposób.' },
            { src: 'image18.png', title: 'Siła i motywacja', cat: 'Praca', tags: ['ciężarówka', 'agresja', 'złość'], desc: 'Wzrost formy i determinacja.' },
            { src: 'image19.png', title: 'Skupienie przed kamerą', cat: 'Stream', tags: ['twarz', 'live'], desc: 'Mężczyzna patrzy bezpośrednio w obiektyw.' },
            { src: 'image20.png', title: 'Spojrzenie z góry', cat: 'Stream', tags: ['perspektywa', 'memy'], desc: 'Ujęcie z niskiej perspektywy.' },
            { src: 'image21.jpg', title: 'Gest sympatii', cat: 'Stream', tags: ['serce', 'dłonie'], desc: 'Kształt serca dłońmi.' },
            { src: 'image22.png', title: 'W ciężarówce', cat: 'Praca', tags: ['tir', 'trasa'], desc: 'Transmisja na żywo z kabiny.' },
            { src: 'image24.png', title: 'Nawodnienie', cat: 'Stream', tags: ['piwo', 'alkoholik'], desc: 'Chwila przerwy z napojem.' },
            { src: 'image25.png', title: 'Deska', cat: 'Praca', tags: ['koniec', 'setup'], desc: 'Kadr kończący transmisję.' },
            { src: 'image26.jpg', title: 'Chwila wytchnienia', cat: 'Relaks', tags: ['chill', 'wakacje'], desc: 'Kadr uchwycony w momencie pełnego odprężenia.' },
            { src: 'image27.png', title: 'Orzeźwienie', cat: 'Stream', tags: ['piwo', 'lech', 'alkoholik'], desc: 'Kulisowe ujęcie z transmisji na żywo.' }
        ];

        let filteredItems = [];
        let currentIndex = 0;
        let isFavoritesView = false;
        let currentCategory = 'all';
        let searchQuery = '';

        function renderGallery() {
            const container = document.getElementById('gallery');
            const favs = JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]');
            container.innerHTML = '';
            filteredItems = [];

            photosDatabase.forEach((photo) => {
                const matchesCat = (currentCategory === 'all' || photo.cat === currentCategory);
                const s = searchQuery.toLowerCase();
                const matchesSearch = photo.title.toLowerCase().includes(s) || (photo.tags && photo.tags.some(t => t.toLowerCase().includes(s)));
                const isFav = favs.includes(photo.src);
                if (matchesCat && matchesSearch && (!isFavoritesView || isFav)) {
                    filteredItems.push(photo);
                    const index = filteredItems.length - 1;
                    const card = document.createElement('div');
                    card.className = "group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 gallery-img cursor-pointer";
                    card.innerHTML = `<div onclick="openModal(${index})"><div class="aspect-[4/5] overflow-hidden"><img src="${photo.src}" class="w-full h-full object-cover"></div><div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end"><h3 class="text-lg font-bold text-white mb-1">${photo.title}</h3><p class="text-xs text-indigo-300 font-semibold uppercase">${photo.cat}</p></div></div><button onclick="toggleFavorite(event, '${photo.src}')" class="absolute top-4 right-4 z-20 p-2.5 rounded-full text-white favorite-btn"><i class="${isFav ? 'fas fa-heart text-red-500' : 'far fa-heart text-gray-200'}"></i></button>`;
                    container.appendChild(card);
                }
            });
        }

        function openModal(index) { currentIndex = index; updateModal(); document.getElementById('imageModal').classList.remove('hidden'); }
        function updateModal() {
            const item = filteredItems[currentIndex];
            document.getElementById('modalImage').src = item.src;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDescriptionText').textContent = item.desc;
            document.getElementById('modalDownloadBtn').href = item.src;
            const tagsCont = document.getElementById('modalTags');
            tagsCont.innerHTML = '';
            item.tags.forEach(t => {
                const s = document.createElement('span');
                s.className = "tag-badge bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded text-[10px] font-bold";
                s.textContent = '#' + t;
                s.onclick = () => { searchQuery = t; document.getElementById('searchInput').value = t; closeImageModal(); renderGallery(); };
                tagsCont.appendChild(s);
            });
            const favs = JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]');
            document.getElementById('modalFavBtn').innerHTML = `<i class="${favs.includes(item.src) ? 'fas fa-heart text-red-500' : 'far fa-heart'}"></i>`;
        }

        function filterCategory(val) { currentCategory = val; renderGallery(); }
        function filterSearch() { searchQuery = document.getElementById('searchInput').value; renderGallery(); }
        function toggleFavoritesView() { isFavoritesView = !isFavoritesView; document.getElementById('favoritesTabBtn').classList.toggle('bg-indigo-600', isFavoritesView); renderGallery(); }
        function toggleFavorite(e, p) { if(e) e.stopPropagation(); let favs = JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]'); favs.includes(p) ? favs = favs.filter(f => f !== p) : favs.push(p); localStorage.setItem('justAndrewFavorites', JSON.stringify(favs)); renderGallery(); if(!document.getElementById('imageModal').classList.contains('hidden')) updateModal(); }
        function toggleFavoriteFromModal() { toggleFavorite(null, filteredItems[currentIndex].src); }
        function toggleTheme() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', d ? 'dark' : 'light'); }
        function closeImageModal() { document.getElementById('imageModal').classList.add('hidden'); }
        function checkCloseModal(e) { if(e.target.id === 'imageModal') closeImageModal(); }
        function toggleDescription() { document.getElementById('descriptionBox').classList.toggle('hidden'); }
        function nextImage() { currentIndex = (currentIndex + 1) % filteredItems.length; updateModal(); }
        function prevImage() { currentIndex = (currentIndex - 1 + filteredItems.length) % filteredItems.length; updateModal(); }
        function openDiscordModal() { document.getElementById('discordModal').classList.remove('hidden'); document.getElementById('discordModal').classList.add('flex'); }
        function copyDirect(t) { navigator.clipboard.writeText(t); alert('Skopiowano!'); }
        function showConfirmationOptions() { document.getElementById('adActionButtons').classList.add('hidden'); document.getElementById('adConfirmationOptions').classList.remove('hidden'); }
        function cancelConfirmationOptions() { document.getElementById('adConfirmationOptions').classList.add('hidden'); document.getElementById('adActionButtons').classList.remove('hidden'); }
        function dismissAdPermanently() { document.getElementById('adBanner').remove(); }

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            renderGallery();
        });
    </script>
</body>
</html>
