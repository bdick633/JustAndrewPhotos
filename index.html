<!DOCTYPE html>
<html lang="pl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAndrew - Galeria Fotografii</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥵%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        html.dark body { background-color: #0D0E12; color: #E2E8F0; }
        html.dark #siteTitle, html.dark #mainHeading { color: #FFFFFF; }
        html.dark .bg-card { background-color: #1a1c24; border-color: #1f2937; }

        .gallery-img { transition: transform 0.4s ease-out, filter 0.4s ease; }
        .gallery-img:hover { transform: scale(1.02); filter: brightness(1.05); }
        
        .modal-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .favorite-btn {
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }

        /* Naprawa błędu z uciekającymi przyciskami */
        #imageModal {
            display: none;
            align-items: flex-start; /* Pozwala na scrollowanie od góry */
            overflow-y: auto;
            padding: 20px 10px;
        }
        #imageModal.active { display: flex; }

        .custom-svg-icon svg { fill: none; stroke: currentColor; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body class="bg-[#F3F4F6] text-gray-800 font-sans min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white" id="siteBody">

    <div id="adBanner" class="bg-gradient-to-r from-emerald-600 to-teal-600 py-3 px-6 shadow-sm border-b border-emerald-400/20">
        <div class="max-w-6xl mx-auto flex flex-wrap justify-between items-center gap-3 text-white">
            <div class="flex items-center gap-3 text-sm">
                <span class="bg-white/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Reklama</span>
                <p>Serwer: <span class="font-mono font-bold">JustAndrewSMP.aternos.me</span></p>
            </div>
            <button onclick="copyDirect('JustAndrewSMP.aternos.me')" class="text-xs bg-white text-emerald-900 font-bold py-1 px-3 rounded-lg hover:bg-emerald-50 transition">Kopiuj IP</button>
        </div>
    </div>

    <header class="py-8 px-6 max-w-6xl mx-auto w-full flex justify-between items-center">
        <div id="siteTitle" class="font-extrabold text-2xl tracking-tight">JustAndrew</div>
        <div class="flex items-center space-x-4">
            <button onclick="toggleFavoritesView()" id="favoritesTabBtn" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold bg-gray-200 dark:bg-gray-800 transition-all">
                <i class="far fa-heart"></i> <span id="favoritesTabText">Ulubione</span>
            </button>
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800"><i id="themeIcon" class="fas fa-moon"></i></button>
            <div class="hidden md:flex items-center space-x-4 text-gray-500">
                <a href="https://www.tiktok.com/@endrjugod666" target="_blank" class="hover:text-indigo-500 transition"><i class="fab fa-tiktok text-xl"></i></a>
                <a href="https://tipply.pl/@justandrew" target="_blank" class="custom-svg-icon w-6 h-6 hover:text-indigo-500 transition">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="34" font-weight="900" fill="currentColor" stroke="none">Tip</text></svg>
                </a>
                <button onclick="openDiscordModal()" class="hover:text-indigo-500 transition"><i class="fab fa-discord text-xl"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow px-6 max-w-6xl mx-auto w-full py-6">
        <section class="text-center mb-10">
            <h1 id="mainHeading" class="text-4xl md:text-6xl font-black mb-4">Galeria Fotografii</h1>
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                <select id="categorySelect" onchange="filterCategory(this.value)" class="w-full md:w-64 px-4 py-3 bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="all">Wszystkie kategorie</option>
                    <option value="Stream">Stream</option>
                    <option value="Praca">Praca</option>
                </select>
                <div class="relative w-full max-w-xs">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="filterSearch()" placeholder="Szukaj (np. zakola, piwo, gej)..." class="w-full pl-11 pr-4 py-3 bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
                </div>
            </div>
        </section>

        <div id="emptySearchNotice" class="hidden text-center p-12 bg-white dark:bg-[#1a1c24] rounded-3xl border border-gray-200 dark:border-gray-800 mb-8">
            <i class="fas fa-search text-3xl text-gray-400 mb-2"></i>
            <h2 class="font-bold">Nie znaleziono takiego zdjęcia</h2>
        </div>

        <div id="emptyFavoritesNotice" class="hidden text-center p-12 bg-white dark:bg-[#1a1c24] rounded-3xl border border-gray-200 dark:border-gray-800 mb-8">
            <i class="far fa-heart text-3xl text-indigo-500 mb-2"></i>
            <h2 class="font-bold">Nic tu nie masz polubionego</h2>
        </div>

        <section id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 pb-12"></section>
    </main>

    <footer class="py-6 border-t border-gray-200 dark:border-gray-800 text-center text-xs text-gray-400">&copy; 2026 JustAndrew.</footer>

    <div id="imageModal" onclick="checkCloseModal(event)" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 justify-center">
        <div onclick="event.stopPropagation()" class="relative max-w-3xl w-full bg-white dark:bg-[#1a1c24] my-auto rounded-3xl overflow-hidden shadow-2xl modal-fade-in flex flex-col">
            <div class="p-4 flex justify-between items-center border-b border-gray-100 dark:border-gray-800">
                <button id="modalFavBtn" onclick="toggleFavoriteFromModal()" class="w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 dark:border-gray-700 dark:text-white"><i class="far fa-heart"></i></button>
                <h3 id="modalTitle" class="font-bold text-lg dark:text-white"></h3>
                <button onclick="closeImageModal()" class="w-10 h-10 text-gray-400 hover:text-red-500 text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="relative group bg-black/5 flex items-center justify-center min-h-[300px]">
                <button onclick="prevImage()" class="absolute left-4 z-10 w-10 h-10 rounded-full bg-black/20 text-white hover:bg-indigo-600 transition"><i class="fas fa-chevron-left"></i></button>
                <img id="modalImage" src="" class="max-w-full max-h-[70vh] object-contain">
                <button onclick="nextImage()" class="absolute right-4 z-10 w-10 h-10 rounded-full bg-black/20 text-white hover:bg-indigo-600 transition"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="p-6">
                <div id="descriptionBox" class="hidden mb-4 p-4 bg-gray-50 dark:bg-[#0D0E12] rounded-2xl border border-gray-100 dark:border-gray-700">
                    <p id="modalDescriptionText" class="text-sm text-gray-600 dark:text-gray-300 mb-3"></p>
                    <div id="modalTags" class="text-[11px] font-mono text-indigo-500 font-bold tracking-wider"></div>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <button onclick="toggleDescription()" id="descButton" class="py-2.5 px-4 bg-amber-500 text-white rounded-xl text-xs font-bold"><i class="fas fa-info-circle mr-1"></i> Pokaż opis</button>
                    <a id="modalDownloadBtn" href="" download class="py-2.5 px-4 bg-green-600 text-white rounded-xl text-xs font-bold text-center"><i class="fas fa-download mr-1"></i> Pobierz</a>
                    <a id="modalNewTabBtn" href="" target="_blank" class="py-2.5 px-4 bg-indigo-600 text-white rounded-xl text-xs font-bold text-center"><i class="fas fa-external-link-alt mr-1"></i> Nowa karta</a>
                    <button onclick="closeImageModal()" class="py-2.5 px-4 bg-gray-500 text-white rounded-xl text-xs font-bold"><i class="fas fa-times mr-1"></i> Zamknij</button>
                </div>
            </div>
        </div>
    </div>

    <div id="discordModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-6">
        <div onclick="event.stopPropagation()" class="max-w-xs w-full bg-white dark:bg-[#1a1c24] p-8 rounded-3xl text-center">
            <i class="fab fa-discord text-5xl text-[#5865F2] mb-4"></i>
            <p class="text-2xl font-black text-indigo-600 mb-6">andrewk0x</p>
            <button onclick="copyDirect('andrewk0x')" class="w-full py-3 bg-[#5865F2] text-white font-bold rounded-xl mb-3">Kopiuj nazwę</button>
            <button onclick="document.getElementById('discordModal').classList.add('hidden')" class="text-gray-400 text-sm">Zamknij</button>
        </div>
    </div>

    <div id="toastNotification" class="fixed bottom-5 right-5 z-[100] flex items-center gap-3 bg-white dark:bg-[#1a1c24] px-5 py-3 rounded-2xl shadow-2xl border border-gray-100 hidden">
        <div class="w-6 h-6 rounded-full bg-green-500 text-white flex items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>
        <p class="text-xs font-bold dark:text-white">Skopiowano!</p>
    </div>

    <script>
        const photosData = [
            { src: 'image1.png', title: 'Moment zdziwienia', cat: 'Stream', tags: '#surprise #face #fun', desc: 'Zaskoczenie uchwycone podczas live.' },
            { src: 'image2.png', title: 'Duet', cat: 'Stream', tags: '#rodzeństwo #przyjaciele #znajomi', desc: 'Rodzeństwo lub najlepsi kumple w akcji.' },
            { src: 'image3.png', title: 'Flexing', cat: 'Stream', tags: '#mięśnie #biceps #siła', desc: 'Prezentacja stalowych mięśni.' },
            { src: 'image4.png', title: 'Świeca', cat: 'Stream', tags: '#świeca #akrobata #idiota', desc: 'Wykonywanie świecy w dziwnych okolicznościach.' },
            { src: 'image5.png', title: 'Refreshment', cat: 'Stream', tags: '#piwo #lech #alkoholik', desc: 'Zasłużone piwko po ciężkim dniu.' },
            { src: 'image6.png', title: 'Głębokie skupienie', cat: 'Stream', tags: '#zakola #twarz', desc: 'Koncentracja tak silna, że aż zakola widać.' },
            { src: 'image9.png', title: 'Serce', cat: 'Stream', tags: '#uwu #gej', desc: 'Słodki gest dla kochanej społeczności.' },
            { src: 'image11.png', title: 'Z puszystym przyjacielem', cat: 'Stream', tags: '#kot #przyjaciel #dziecko #cute', desc: 'Chwila z moim małym dzieckiem.' },
            { src: 'image16.png', title: 'Serce w pracy', cat: 'Praca', tags: '#ciężarówka #cute', desc: 'Miłość do trasy i ciężarówek.' },
            { src: 'image18.png', title: 'Siła i motywacja', cat: 'Praca', tags: '#ciężarówka #agresja #złość', desc: 'Kiedy droga wywołuje czystą agresję.' },
            { src: 'image19.png', title: 'Skupienie przed kamerą', cat: 'Stream', tags: '#look #eye', desc: 'Poważne spojrzenie w obiektyw.' },
            { src: 'image22.png', title: 'W ciężarówce', cat: 'Praca', tags: '#driving #trucker', desc: 'Moje mobilne biuro.' },
            { src: 'image25.png', title: 'Deska', cat: 'Praca', tags: '#view #truck', desc: 'Widok który widzę codziennie.' }
        ];

        let filteredItems = [];
        let currentIndex = 0;
        let isFavoritesView = false;
        let currentCategory = 'all';
        let searchQuery = '';

        function renderGallery() {
            const container = document.getElementById('gallery');
            const favs = JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]');
            container.innerHTML = '';
            filteredItems = [];

            photosData.forEach(photo => {
                const matchesCat = (currentCategory === 'all' || photo.cat === currentCategory);
                const search = searchQuery.toLowerCase();
                const matchesSearch = photo.title.toLowerCase().includes(search) || photo.tags.toLowerCase().includes(search);
                const isFav = favs.includes(photo.src);
                const matchesFavs = !isFavoritesView || isFav;

                if (matchesCat && matchesSearch && matchesFavs) {
                    filteredItems.push(photo);
                    const idx = filteredItems.length - 1;
                    const card = document.createElement('div');
                    card.className = "group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] shadow-sm gallery-img cursor-pointer";
                    card.innerHTML = `
                        <div onclick="openModal(${idx})">
                            <img src="${photo.src}" class="w-full h-72 object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-6 flex flex-col justify-end">
                                <h3 class="text-white font-bold">${photo.title}</h3>
                                <p class="text-indigo-300 text-[10px] uppercase font-bold">${photo.cat}</p>
                            </div>
                        </div>
                        <button onclick="toggleFavorite(event, '${photo.src}')" class="absolute top-4 right-4 p-2 rounded-full text-white favorite-btn">
                            <i class="${isFav ? 'fas fa-heart text-red-500' : 'far fa-heart'}"></i>
                        </button>`;
                    container.appendChild(card);
                }
            });

            document.getElementById('emptySearchNotice').classList.toggle('hidden', filteredItems.length > 0 || isFavoritesView);
            document.getElementById('emptyFavoritesNotice').classList.toggle('hidden', filteredItems.length > 0 || !isFavoritesView);
        }

        function openModal(index) {
            currentIndex = index;
            updateModal();
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateModal() {
            const item = filteredItems[currentIndex];
            document.getElementById('modalImage').src = item.src;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDescriptionText').textContent = item.desc;
            document.getElementById('modalTags').textContent = item.tags;
            document.getElementById('modalDownloadBtn').href = item.src;
            document.getElementById('modalNewTabBtn').href = item.src;
            
            const isFav = (JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]')).includes(item.src);
            document.getElementById('modalFavBtn').innerHTML = `<i class="${isFav ? 'fas fa-heart text-red-500' : 'far fa-heart'}"></i>`;
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('descriptionBox').classList.add('hidden');
        }

        function toggleDescription() {
            const box = document.getElementById('descriptionBox');
            const btn = document.getElementById('descButton');
            const isHidden = box.classList.toggle('hidden');
            btn.innerHTML = isHidden ? '<i class="fas fa-info-circle mr-1"></i> Pokaż opis' : '<i class="fas fa-info-circle mr-1"></i> Ukryj opis';
        }

        function toggleFavorite(e, src) {
            if(e) e.stopPropagation();
            let favs = JSON.parse(localStorage.getItem('justAndrewFavorites') || '[]');
            const i = favs.indexOf(src);
            if(i === -1) favs.push(src); else favs.splice(i,1);
            localStorage.setItem('justAndrewFavorites', JSON.stringify(favs));
            renderGallery();
            if(document.getElementById('imageModal').classList.contains('active')) updateModal();
        }

        function toggleFavoriteFromModal() { toggleFavorite(null, filteredItems[currentIndex].src); }
        function filterCategory(c) { currentCategory = c; renderGallery(); }
        function filterSearch() { searchQuery = document.getElementById('searchInput').value; renderGallery(); }
        function toggleFavoritesView() {
            isFavoritesView = !isFavoritesView;
            document.getElementById('favoritesTabBtn').classList.toggle('bg-indigo-600', isFavoritesView);
            document.getElementById('favoritesTabBtn').classList.toggle('text-white', isFavoritesView);
            document.getElementById('favoritesTabText').textContent = isFavoritesView ? "Wszystkie" : "Ulubione";
            renderGallery();
        }
        function toggleTheme() {
            const dark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = dark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        function copyDirect(t) { navigator.clipboard.writeText(t); document.getElementById('toastNotification').classList.remove('hidden'); setTimeout(()=>document.getElementById('toastNotification').classList.add('hidden'), 2000); }
        function openDiscordModal() { document.getElementById('discordModal').classList.remove('hidden'); document.getElementById('discordModal').classList.add('flex'); }
        function checkCloseModal(e) { if(e.target.id === 'imageModal') closeImageModal(); }
        function nextImage() { currentIndex = (currentIndex + 1) % filteredItems.length; updateModal(); }
        function prevImage() { currentIndex = (currentIndex - 1 + filteredItems.length) % filteredItems.length; updateModal(); }

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('themeIcon').className = 'fas fa-sun'; }
            renderGallery();
        });
    </script>
</body>
</html>
