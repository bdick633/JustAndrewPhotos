    <script>
        tailwind.config = {
            darkMode: 'class',
        }

    <style>
        /* Gwarantujemy, że po dodaniu klasy 'dark' na tag HTML, kolory się zmienią */
        html.dark body { background-color: #0D0E12; color: #E2E8F0; }
        html.dark #siteTitle, html.dark #mainHeading { color: #FFFFFF; }
        html.dark #mainSubtext { color: #94A3B8; }
        html.dark .bg-card { background-color: #1a1c24; border-color: #1f2937; }
        html.dark .text-card { color: #FFFFFF; }
        html.dark .subtext-card { color: #94A3B8; }

        .gallery-img { transition: transform 0.4s ease-out, filter 0.4s ease; }
        .gallery-img:hover { transform: scale(1.03); filter: brightness(1.05); }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        /* Płynne przejścia */
        body, header, footer, main, .bg-card, #siteTitle, #mainHeading, #mainSubtext {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        /* Animacja powiadomienia */
        .notification-fade-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animacja Toast */
        .toast-enter { animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-leave { animation: toastOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(10px) scale(0.96); } }
    </style>
</head>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.className = 'fas fa-moon text-lg';
            } else {
                html.classList.add('dark');
                themeIcon.className = 'fas fa-sun text-lg';
            }
        }

        function openImageModal(src, title, description) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImage').src = src;
            document.getElementById('modalDescriptionText').innerText = description;

            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('descriptionBox').classList.add('hidden');
            document.getElementById('descButton').innerText = 'Pokaż opis';
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function checkCloseModal(event) {
            if (event.target.id === 'imageModal') {
                closeImageModal();
            }
        }

        function toggleDescription() {
            const descriptionBox = document.getElementById('descriptionBox');
            const descButton = document.getElementById('descButton');

            if (descriptionBox.classList.contains('hidden')) {
                descriptionBox.classList.remove('hidden');
                descButton.innerText = 'Ukryj opis';
            } else {
                descriptionBox.classList.add('hidden');
                descButton.innerText = 'Pokaż opis';
            }
        }

        function openDiscordModal() {
            alert('Mój Discord: just_andrew');
        }
    </script>
