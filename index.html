<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustAndrew - Galeria Fotografii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gallery-img { transition: transform 0.4s ease-out, filter 0.4s ease; }
        .gallery-img:hover { transform: scale(1.03); filter: brightness(1.05); }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        /* Płynne przejścia dla zmiany motywu */
        body, header, footer, main, .bg-card, .border-custom {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body class="bg-[#F3F4F6] text-gray-800 font-min min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white" id="siteBody">

    <header class="py-8 px-6 md:px-12 flex justify-between items-center max-w-6xl mx-auto w-full">
        <div class="flex items-center space-x-3">
            <span id="siteTitle" class="font-extrabold text-2xl tracking-tight text-gray-900">JustAndrew</span>
        </div>

        <div class="flex items-center space-x-5">
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-indigo-400 focus:outline-none transition-all duration-300" aria-label="Zmień motyw">
                <i id="themeIcon" class="fas fa-moon text-lg"></i>
            </button>

            <div class="flex items-center space-x-4 text-gray-600 dark:text-gray-400">
                <a href="https://www.instagram.com/andrewgod666/" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400"><i class="fab fa-instagram text-xl"></i></a>
                <a href="https://www.facebook.com/people/%C5%81ukasz-Andrzejewski/pfbid0McQqiu1gHFkZE8tBkYXC8iRYKnGYcY9Jhr5UgGerzrWY8VAdDW8ajZZhye9nKo6Tl/" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400"><i class="fab fa-facebook-f text-xl"></i></a>
                <a href="https://www.youtube.com/@andrewgod666" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400"><i class="fab fa-youtube text-xl"></i></a>
                <a href="https://www.tiktok.com/@endrjugod666?_r=1&_t=ZN-967GapBXcLW" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400" title="TikTok"><i class="fab fa-tiktok text-xl"></i></a>
                <a href="https://steamcommunity.com/id/asdasdasdas1231" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400" title="Steam"><i class="fab fa-steam text-xl"></i></a>
                <button onclick="openDiscordModal()" class="hover:text-indigo-600 dark:hover:text-indigo-400 focus:outline-none"><i class="fab fa-discord text-xl"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow px-6 md:px-12 max-w-6xl mx-auto w-full py-10">
        <section class="text-center mb-16 max-w-2xl mx-auto">
            <h1 id="mainHeading" class="text-4xl md:text-6xl font-black text-gray-900 mb-4">Witaj w moim świecie</h1>
            <p id="mainSubtext" class="text-gray-600 dark:text-gray-400 text-lg md:text-xl leading-relaxed">Jestem JustAndrew. Zobacz moje fotografie poniżej.</p>
        </section>

        <section id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 pb-12">
            
            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image19.jpg', 'Nowy kadr 19', 'Opis dla zdjęcia 19.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image19.jpg" alt="Zdjęcie 19" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 19</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Styl życia</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image20.jpg', 'Nowy kadr 20', 'Opis dla zdjęcia 20.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image20.jpg" alt="Zdjęcie 20" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 20</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Praca</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image21.jpg', 'Nowy kadr 21', 'Opis dla zdjęcia 21.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image21.jpg" alt="Zdjęcie 21" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 21</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Portret</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image22.jpg', 'Nowy kadr 22', 'Opis dla zdjęcia 22.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image22.jpg" alt="Zdjęcie 22" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 22</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Emocje</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image23.jpg', 'Nowy kadr 23', 'Opis dla zdjęcia 23.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image23.jpg" alt="Zdjęcie 23" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 23</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Ludzie</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image24.png', 'Nowy kadr 24', 'Opis dla zdjęcia 24.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image24.png" alt="Zdjęcie 24" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 24</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Siła</p>
                    </div>
                </button>
            </div>

            <div class="group relative overflow-hidden rounded-2xl bg-white dark:bg-[#1a1c24] border border-gray-200 dark:border-gray-800 hover:border-indigo-400/80 dark:hover:border-indigo-500/50 shadow-sm duration-300 gallery-img cursor-pointer">
                <button onclick="openImageModal('image25.jpg', 'Nowy kadr 25', 'Opis dla zdjęcia 25.')" class="w-full text-left focus:outline-none h-full block">
                    <div class="aspect-[4/5] overflow-hidden"><img src="image25.jpg" alt="Zdjęcie 25" class="w-full h-full object-cover"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                        <h3 class="text-lg font-bold text-white mb-1">Nowy kadr 25</h3>
                        <p class="text-xs text-indigo-300 font-semibold tracking-wider uppercase">Akcja</p>
                    </div>
                </button>
            </div>

        </section>
    </main>

    <footer id="footerText" class="py-6 border-t border-gray-200 dark:border-gray-800 text-center text-sm text-gray-500 dark:text-gray-400">
        &copy; 2026 JustAndrew. Wszelkie prawa zastrzeżone.
    </footer>

    <div id="imageModal" onclick="checkCloseModal(event)" class="fixed inset-0 bg-black/85 backdrop-blur-md flex items-center justify-center z-50 p-6 hidden">
        <div onclick="event.stopPropagation()" class="max-w-4xl w-full flex flex-col items-center modal-fade-in bg-[#F3F4F6] dark:bg-[#1a1c24] p-6 rounded-3xl border border-gray-300 dark:border-gray-700 shadow-2xl">
            <div class="w-full flex justify-center items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-900 dark:text-white"></h3>
            </div>
            
            <div class="max-h-[50vh] w-full flex justify-center mb-6">
                <img id="modalImage" src="" alt="Powiększone zdjęcie" class="object-contain max-h-full rounded-2xl shadow-lg border border-gray-300 dark:border-gray-700">
            </div>

            <div id="descriptionBox" class="hidden w-full max-w-2xl bg-white dark:bg-[#0D0E12] p-4 rounded-2xl border border-gray-300 dark:border-gray-700 mb-6 text-sm md:text-base text-gray-700 dark:text-gray-300 leading-relaxed shadow-inner max-h-[150px] overflow-y-auto">
                <p id="modalDescriptionText"></p>
            </div>

            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 w-full justify-center items-stretch sm:items-center">
                
                <button onclick="toggleDescription()" id="descButton" class="sm:flex-1 py-3.5 px-5 bg-amber-600 hover:bg-amber-500 text-white font-semibold rounded-xl transition duration-200 flex items-center justify-center text-center">
                    <i class="fas fa-info-circle mr-2.5"></i> Pokaż opis
                </button>

                <a id="modalDownloadBtn" href="" download class="sm:flex-1 py-3.5 px-5 bg-green-600 hover:bg-green-500 text-center text-white font-semibold rounded-xl transition duration-200 flex items-center justify-center">
                    <i class="fas fa-download mr-2.5"></i> Pobierz
                </a>

                <a id="modalNewTabBtn" href="" target="_blank" class="sm:flex-1 py-3.5 px-5 bg-indigo-600 hover:bg-indigo-500 text-center text-white font-semibold rounded-xl transition duration-200 flex items-center justify-center">
                    <i class="fas fa-external-link-alt mr-2.5"></i> Nowa karta
                </a>

                <button onclick="closeImageModal()" class="sm:flex-1 py-3.5 px-5 bg-white dark:bg-[#0D0E12] hover:bg-gray-100 dark:hover:bg-gray-900 text-gray-800 dark:text-gray-300 font-semibold border border-gray-300 dark:border-gray-700 rounded-xl transition duration-200 flex items-center justify-center">
                    Zamknij
                </button>
            </div>
        </div>
    </div>

    <div id="discordModal" onclick="checkCloseDiscord(event)" class="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div onclick="event.stopPropagation()" class="bg-[#F3F4F6] dark:bg-[#1a1c24] p-8 rounded-3xl border border-gray-300 dark:border-gray-700 max-w-sm w-full mx-6 text-center shadow-2xl modal-fade-in">
            <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-6 text-3xl"><i class="fab fa-discord"></i></div>
            <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Znajdź mnie na Discordzie</h2>
            <p class="text-gray-600 dark:text-gray-400 text-sm mb-6 leading-relaxed">Mój tag discord:</p>
            <div class="bg-gray-50 dark:bg-[#0D0E12] rounded-xl p-3 border border-gray-300 dark:border-gray-700 flex items-center justify-between mb-8">
                <span id="discordTag" class="text-gray-900 dark:text-white font-mono font-semibold px-2">andrewk0x</span>
                <button onclick="copyToClipboard()" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 text-sm font-semibold px-3 py-1 bg-indigo-50 dark:bg-indigo-950/30 rounded-lg transition-all duration-200"><i class="far fa-copy mr-1"></i> Kopiuj</button>
            </div>
            <button onclick="closeDiscordModal()" class="w-full py-3 rounded-xl bg-gray-900 dark:bg-gray-800 text-white font-medium border border-gray-800">Zamknij</button>
        </div>
    </div>

    <script>
        const siteBody = document.getElementById('siteBody');
        const themeIcon = document.getElementById('themeIcon');

        // Automatyczne ustawienie trybu jasnego na starcie
        window.onload = function() {
            applyLightTheme();
            localStorage.setItem('theme', 'light');
        }

        function toggleTheme() {
            if (siteBody.classList.contains('bg-[#F3F4F6]')) {
                applyDarkTheme();
                localStorage.setItem('theme', 'dark');
            } else {
                applyLightTheme();
                localStorage.setItem('theme', 'light');
            }
        }

        function applyDarkTheme() {
            siteBody.className = 'bg-[#0D0E12] text-gray-300 font-min min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white';
            document.getElementById('siteTitle').className = 'font-extrabold text-2xl tracking-tight text-white';
            document.getElementById('mainHeading').className = 'text-4xl md:text-6xl font-black text-white mb-4';
            document.getElementById('mainSubtext').className = 'text-gray-400 text-lg md:text-xl leading-relaxed';
            document.getElementById('footerText').className = 'py-6 border-t border-gray-800 text-center text-sm text-gray-400';
            themeIcon.className = 'fas fa-sun text-lg';
        }

        function applyLightTheme() {
            siteBody.className = 'bg-[#F3F4F6] text-gray-800 font-min min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white';
            document.getElementById('siteTitle').className = 'font-extrabold text-2xl tracking-tight text-gray-900';
            document.getElementById('mainHeading').className = 'text-4xl md:text-6xl font-black text-gray-900 mb-4';
            document.getElementById('mainSubtext').className = 'text-gray-600 text-lg md:text-xl leading-relaxed';
            document.getElementById('footerText').className = 'py-6 border-t border-gray-200 text-center text-sm text-gray-500';
            themeIcon.className = 'fas fa-moon text-lg';
        }

        function openDiscordModal() { 
            document.getElementById('discordModal').classList.remove('hidden'); 
        }
        function closeDiscordModal() { 
            document.getElementById('discordModal').classList.add('hidden'); 
        }
        
        function checkCloseDiscord(event) {
            if (event.target.id === 'discordModal') {
                closeDiscordModal();
            }
        }
        function checkCloseModal(event) {
            if (event.target.id === 'imageModal') {
                closeImageModal();
            }
        }

        function openImageModal(imageSrc, titleText, descriptionText) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('modalTitle').textContent = titleText;
            document.getElementById('modalNewTabBtn').href = imageSrc;
            document.getElementById('modalDownloadBtn').href = imageSrc;

            document.getElementById('modalDescriptionText').textContent = descriptionText;
            
            // Ukryj pole opisu i zresetuj przycisk przy otwieraniu
            document.getElementById('descriptionBox').classList.add('hidden');
            document.getElementById('descButton').innerHTML = '<i class="fas fa-info-circle mr-2"></i> Pokaż opis';

            document.getElementById('imageModal').classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        function toggleDescription() {
            const descBox = document.getElementById('descriptionBox');
            const descBtn = document.getElementById('descButton');
            
            if (descBox.classList.contains('hidden')) {
                descBox.classList.remove('hidden');
                descBtn.innerHTML = '<i class="fas fa-eye-slash mr-2"></i> Ukryj opis';
            } else {
                descBox.classList.add('hidden');
                descBtn.innerHTML = '<i class="fas fa-info-circle mr-2"></i> Pokaż opis';
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText('andrewk0x').then(() => {
                const btn = document.querySelector('#discordModal button[onclick="copyToClipboard()"]');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-1"></i> Skopiowano!';
                btn.className = 'text-green-600 dark:text-green-400 text-sm font-semibold px-3 py-1 bg-indigo-50 dark:bg-indigo-950/30 rounded-lg transition-all duration-200';
                setTimeout(() => { 
                    btn.innerHTML = originalHtml; 
                    btn.className = 'text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 text-sm font-semibold px-3 py-1 bg-indigo-50 dark:bg-indigo-950/30 rounded-lg transition-all duration-200'; 
                }, 2000);
            });
        }
    </script>
</body>
</html>
