                <span class="text-gray-900 dark:text-white font-mono font-semibold px-2">andrewk0x</span>
                <button onclick="copyToClipboard()" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 text-sm font-semibold px-3 py-1 bg-indigo-50 dark:bg-indigo-950/30 rounded-lg"><i class="far fa-copy mr-1"></i> Kopiuj</button>
            </div>
            <button onclick="closeDiscordModal()" class="w-full py-3 rounded-xl bg-gray-900 dark:bg-gray-800 text-white font-medium border border-gray-800">Zamknij</button>
        </div>
    </div>

    <script>
        const siteBody = document.getElementById('siteBody');
        const themeIcon = document.getElementById('themeIcon');

        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') {
                applyDarkTheme();
            } else {
                applyLightTheme();
            }
        }

        function toggleTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                applyLightTheme();
            } else {
                applyDarkTheme();
            }
        }

        function applyLightTheme() {
            localStorage.setItem('theme', 'light');
            siteBody.classList.remove('bg-[#0D0E12]', 'text-gray-300');
            siteBody.classList.add('bg-[#F3F4F6]', 'text-gray-800');
            themeIcon.className = 'fas fa-moon text-lg';
        }

        function applyDarkTheme() {
            localStorage.setItem('theme', 'dark');
            siteBody.classList.remove('bg-[#F3F4F6]', 'text-gray-800');
            siteBody.classList.add('bg-[#0D0E12]', 'text-gray-300');
            themeIcon.className = 'fas fa-sun text-lg';
        }

        function openImageModal(src, title, description) {
            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImage').src = src;
            document.getElementById('modalDownloadBtn').href = src;
            document.getElementById('modalDescriptionText').innerText = description;
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
            const descBox = document.getElementById('descriptionBox');
            if (!descBox.classList.contains('hidden')) {
                toggleDescription();
            }
        }

        function checkCloseModal(event) {
            if (event.target.id === 'imageModal') {
                closeImageModal();
            }
        }

        function toggleDescription() {
            const descBox = document.getElementById('descriptionBox');
            const descButton = document.getElementById('descButton');
            
            descBox.classList.toggle('hidden');
            if (descBox.classList.contains('hidden')) {
                descButton.innerHTML = '<i class="fas fa-info-circle mr-2.5"></i> Pokaż opis';
            } else {
                descButton.innerHTML = '<i class="fas fa-info-circle mr-2.5"></i> Ukryj opis';
            }
        }

        function openDiscordModal() {
            document.getElementById('discordModal').classList.remove('hidden');
        }

        function closeDiscordModal() {
            document.getElementById('discordModal').classList.add('hidden');
        }

        function checkCloseDiscord(event) {
            if (event.target.id === 'discordModal') {
                closeDiscordModal();
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText('andrewk0x').then(() => {
                alert('Skopiowano tag do schowka!');
            });
        }
    </script>
